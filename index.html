<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Connections</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080F; --s1:#0A0F1C; --s2:#0E1525; --border:#172235;
  --text:#7A9BB8; --muted:#2E4460; --hi:#C8A84B; --white:#CAE0F5;
  --sidebar:265px; --info:310px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;display:flex;flex-direction:column;}

/*  HEADER  */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:.6rem 1.2rem;border-bottom:1px solid var(--border);
  background:var(--s1);flex-shrink:0;gap:.5rem;z-index:50;
  min-height:0;flex-wrap:wrap;
}
#hdr h1{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--white);letter-spacing:.1em;white-space:nowrap;}
.hdr-tag{font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.18em;white-space:nowrap;}
.hdr-meta{display:flex;align-items:center;gap:1.2rem;font-size:.52rem;color:var(--muted);flex-shrink:0;}
.hdr-stat span{color:var(--text);}
.dot{width:5px;height:5px;border-radius:50%;background:#3DE87A;box-shadow:0 0 6px #3DE87A;animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/*  MAIN GRID  */
#app{flex:1;display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:0;overflow:hidden;position:relative;}

/*  SIDEBAR  */
#sidebar{
  background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;z-index:40;
}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.sb-sec{padding:.8rem 1rem;border-bottom:1px solid var(--border);}
.sb-ttl{
  font-family:'Cinzel',serif;font-size:.5rem;font-weight:600;
  color:var(--hi);letter-spacing:.22em;text-transform:uppercase;
  margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem;
}
.sb-ttl::after{content:'';flex:1;height:1px;background:var(--border);}

/* Sphere grid */
.sph-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.sph-chip{
  display:flex;align-items:center;gap:.35rem;padding:5px 7px;
  border-radius:4px;border:1px solid transparent;cursor:pointer;
  font-size:.6rem;color:var(--text);user-select:none;
  transition:background .15s,border-color .15s,opacity .2s;
}
.sph-chip:hover{background:rgba(255,255,255,.04);}
.sph-chip.off{opacity:.22;}
.sph-chip.on{border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.03);}
.sph-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sph-lbl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* Layer rows */
.lyr-row{
  display:flex;align-items:center;gap:.5rem;padding:5px 6px;
  border-radius:5px;cursor:pointer;margin-bottom:2px;
  transition:background .15s;user-select:none;
}
.lyr-row:hover{background:rgba(255,255,255,.03);}
.lyr-icon{font-style:normal;font-size:.65rem;width:18px;text-align:center;flex-shrink:0;color:var(--muted);}
.lyr-name{flex:1;font-size:.65rem;color:var(--text);}
.lyr-count{font-size:.52rem;color:var(--muted);}

/* Toggle switch */
.tog{width:30px;height:16px;border-radius:9px;background:var(--muted);position:relative;flex-shrink:0;transition:background .2s;cursor:pointer;}
.tog.on{background:var(--tc,#888);}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.5);}
.tog.on::after{left:16px;}

/* Stats row */
.sb-stats{padding:.65rem 1rem;font-size:.52rem;display:flex;justify-content:space-between;color:var(--muted);}
.sb-stats span{color:var(--text);}

/*  MAP  */
#map{position:relative;overflow:hidden;background:#04070E;}
#map-svg{width:100%;height:100%;display:block;cursor:grab;}
#map-svg:active{cursor:grabbing;}
.sphere-bg{fill:#060C18;}
.graticule{fill:none;stroke:#0B1525;stroke-width:.5;}
.border-mesh{fill:none;stroke:#142030;stroke-width:.4;}
.cpath{transition:fill-opacity .18s;}
.cpath:hover{fill-opacity:.45 !important;}

/* Arcs */
.arc{fill:none;stroke-linecap:round;pointer-events:none;transition:opacity .25s;}
@keyframes dash-flow{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
.arc.sel{animation:dash-flow 3s linear infinite;}

/* Nodes */
.node{cursor:pointer;}
.nd-halo,.nd-ring{pointer-events:none;}
.nd-core{transition:r .15s ease;}
.node:hover .nd-core{r:7.5;}
.nd-label{
  font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:500;
  fill:rgba(202,224,245,.75);pointer-events:none;text-anchor:middle;
}

/*  RIGHT INFO PANEL  */
#info{
  position:fixed;top:0;right:0;bottom:0;width:var(--info);
  background:var(--s2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;z-index:60;
  transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  padding-top:0;
}
#info.open{transform:translateX(0);}
#info-hdr{
  padding:.9rem 1rem .7rem;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;
}
#info-close{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:.9rem;line-height:1;padding:2px;flex-shrink:0;
  transition:color .15s;
}
#info-close:hover{color:var(--white);}
.info-name{font-family:'Cinzel',serif;font-size:.95rem;color:var(--white);}
.info-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;margin-top:.25rem;
}
.info-badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.info-desc{
  padding:.75rem 1rem;font-size:.6rem;line-height:1.7;
  color:var(--text);border-bottom:1px solid var(--border);flex-shrink:0;
}
#info-conns{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;padding:.5rem 1rem;}
.conn-grp-hdr{
  font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;
  padding:.5rem 0 .3rem;display:flex;align-items:center;gap:.4rem;
}
.conn-grp-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.conn-row{
  display:flex;align-items:center;gap:6px;padding:3px 0;font-size:.58rem;
}
.conn-pip{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.conn-name{flex:1;color:var(--white);}
.conn-bar-bg{width:48px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex-shrink:0;}
.conn-bar-fg{height:100%;border-radius:2px;}
.conn-pct{font-size:.5rem;color:var(--muted);min-width:22px;text-align:right;}
.no-conn{font-size:.58rem;color:var(--muted);padding:.75rem 0;text-align:center;}

/*  TOOLTIP  */
#tip{
  position:fixed;background:var(--s2);border:1px solid var(--border);
  padding:.4rem .65rem;border-radius:4px;font-size:.6rem;
  pointer-events:none;opacity:0;transition:opacity .1s;z-index:9999;
  line-height:1.55;max-width:180px;
}
#tip.show{opacity:1;}

/*  MOBILE BOTTOM SHEET  */
#sheet{
  display:none;position:fixed;left:0;right:0;bottom:0;
  background:var(--s1);border-top:2px solid var(--border);
  z-index:70;flex-direction:column;
  transition:height .3s cubic-bezier(.4,0,.2,1);
  height:64px;
}
#sheet-handle{
  padding:.55rem 0 .3rem;display:flex;flex-direction:column;
  align-items:center;gap:.35rem;cursor:pointer;flex-shrink:0;
}
.handle-bar{width:36px;height:3px;border-radius:2px;background:var(--muted);}
#sheet-tabs{
  display:flex;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sh-tab{
  flex:1;padding:.5rem;font-size:.58rem;text-align:center;
  cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
}
.sh-tab.on{color:var(--hi);border-color:var(--hi);}
#sheet-body{flex:1;overflow-y:auto;padding:.75rem 1rem;}

/*  RESPONSIVE  */

/* Large desktops */
@media(min-width:1600px){
  :root{--sidebar:300px;--info:360px;}
  #hdr h1{font-size:1.15rem;}
  .nd-label{font-size:8px !important;}
}

/* Tablets landscape */
@media(max-width:1024px){
  :root{--sidebar:220px;--info:280px;}
  .sph-grid{grid-template-columns:1fr;}
  .hdr-meta{gap:.7rem;}
}

/* Tablets portrait / small screens */
@media(max-width:768px){
  #app{grid-template-columns:1fr;}
  #sidebar{display:none;}
  #info{display:none;}
  #sheet{display:flex;}
  #map{height:100%;}
  .hdr-meta{display:none;}
  #hdr{padding:.5rem .8rem;}
}

/* Small phones */
@media(max-width:400px){
  #hdr h1{font-size:.82rem;letter-spacing:.06em;}
  .hdr-tag{display:none;}
  #sheet-body{padding:.5rem .7rem;}
  .sh-tab{font-size:.52rem;padding:.4rem .3rem;}
}

/* Very tall narrow screens */
@media(max-height:500px) and (max-width:768px){
  #hdr{padding:.3rem .6rem;}
  #hdr h1{font-size:.78rem;}
}
</style>
</head>
<body>

<div id="hdr">
  <div style="display:flex;align-items:baseline;gap:.8rem;min-width:0;">
    <h1>Global Connections</h1>
    <span class="hdr-tag">Civilisational Alignments</span>
  </div>
  <div class="hdr-meta">
    <div style="display:flex;align-items:center;gap:.4rem;"><div class="dot"></div><span id="stat-arcs">--</span> links</div>
    <div class="hdr-stat"><span id="stat-nodes">--</span> nodes</div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sb-scroll">

      <div class="sb-sec">
        <div class="sb-ttl">Spheres</div>
        <div class="sph-grid" id="sph-leg"></div>
      </div>

      <div class="sb-sec">
        <div class="sb-ttl">Layers</div>
        <div id="lyr-list"></div>
      </div>

    </div>
    <div class="sb-stats">
      <div>Links: <span id="sb-arc-count">--</span></div>
      <div>Selected: <span id="sb-sel">none</span></div>
    </div>
  </div>

  <div id="map"><svg id="map-svg"></svg></div>
</div>

<!-- Right panel -->
<div id="info">
  <div id="info-hdr">
    <div>
      <div class="info-name" id="inf-name"></div>
      <div class="info-badge"><div class="info-badge-dot" id="inf-dot"></div><span id="inf-sphere"></span></div>
    </div>
    <button id="info-close" title="Close">x</button>
  </div>
  <div class="info-desc" id="inf-desc"></div>
  <div id="info-conns"></div>
</div>

<!-- Mobile bottom sheet -->
<div id="sheet">
  <div id="sheet-handle"><div class="handle-bar"></div></div>
  <div id="sheet-tabs" style="display:none;">
    <div class="sh-tab on" data-tab="filters">Layers & Spheres</div>
    <div class="sh-tab" data-tab="info">Country Info</div>
  </div>
  <div id="sheet-body" style="display:none;"></div>
</div>

<div id="tip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

  {id:'netherlands', label:'Netherlands',  sphere:'western',    lon:5,    lat:52,  desc:'Key EU trading hub with the port of Rotterdam as Europe largest. Home to ASML, the sole producer of advanced EUV lithography systems for semiconductor fabrication.'},

  {id:'turkey',      label:'Turkey',       sphere:'middleeast', lon:35,   lat:39,  desc:'NATO member straddling Europe and Asia. Largest economy in the Middle East. Leader of the Turkic world with major defence industry and construction sector abroad.'},

const CONNECTIONS = buildConnections();
const totals = Object.fromEntries(Object.entries(CONNECTIONS).map(([k,v])=>[k,v.length]));
console.log('Connection totals:', totals, 'Total:', Object.values(totals).reduce((a,b)=>a+b,0));

// ──────────────────────────────────────
// RENDERING
// ──────────────────────────────────────

const VW=1200, VH=620;
const svg = d3.select('#map-svg').attr('viewBox',`0 0 ${VW} ${VH}`).attr('preserveAspectRatio','xMidYMid meet');

// Equal Earth projection: equal-area, visually appealing, reduces size distortion
const proj = d3.geoEqualEarth().scale(185).translate([VW/2,VH/2+10]);
const path = d3.geoPath().projection(proj);
const root = svg.append('g').attr('id','root');
const zoom = d3.zoom().scaleExtent([0.5,10]).on('zoom',e=>root.attr('transform',e.transform));
svg.call(zoom).on('dblclick.zoom',null);
svg.on('click',e=>{
  const cls = e.target.className?.baseVal || '';
  if(!cls.includes('node') && !cls.includes('nd-')) deselect();
});

const gGrat = root.append('g');
const gLand = root.append('g');
const gBord = root.append('g');
const gArc  = root.append('g');
const gNode = root.append('g');

let activeSpheres = new Set(Object.keys(SPHERES));
let activeLayers  = new Set(Object.keys(LAYERS));
let selectedId    = null;
let arcData       = [];

//  INIT (load world atlas)
async function init(){
  let world;
  try{world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');}
  catch(e){console.error('Atlas load failed',e);return;}

  const countries = topojson.feature(world, world.objects.countries);
  const borders   = topojson.mesh(world, world.objects.countries,(a,b)=>a!==b);

  gGrat.append('path').datum({type:'Sphere'}).attr('class','sphere-bg').attr('d',path);
  const grat = d3.geoGraticule().step([30,30]);
  gGrat.append('path').datum(grat()).attr('class','graticule').attr('d',path);

  gLand.selectAll('path')
    .data(countries.features).join('path')
    .attr('class','cpath').attr('d',path)
    .each(function(d){
      const sk = ISO_SPHERE[+d.id];
      const c  = sk ? SPHERES[sk].color : '#1C2E44';
      d3.select(this)
        .attr('fill',c).attr('fill-opacity', sk?0.18:0.09)
        .attr('stroke',c).attr('stroke-opacity',sk?0.25:0.10)
        .attr('stroke-width',0.4).attr('data-sphere',sk||'');
    });

  gBord.append('path').datum(borders).attr('class','border-mesh').attr('d',path);

  drawNodes();
  drawArcs();
  buildSidebar();
  buildMobileSheet();
  document.getElementById('stat-nodes').textContent = NODES.length;
}

//  ARCS
function drawArcs(){
  gArc.selectAll('*').remove();
  arcData=[];
  let count=0;

  Object.keys(LAYERS).forEach((layer,li)=>{
    if(!activeLayers.has(layer)) return;
    const def=LAYERS[layer];
    (CONNECTIONS[layer]||[]).forEach(([from,to,str])=>{
      if(!nodeMap[from]||!nodeMap[to]) return;
      if(!activeSpheres.has(nodeMap[from].sphere)||!activeSpheres.has(nodeMap[to].sphere)) return;

      const pa=proj([nodeMap[from].lon,nodeMap[from].lat]);
      const pb=proj([nodeMap[to].lon,nodeMap[to].lat]);
      if(!pa||!pb) return;

      const mx=(pa[0]+pb[0])/2, my=(pa[1]+pb[1])/2;
      const dx=pb[0]-pa[0], dy=pb[1]-pa[1];
      const len=Math.hypot(dx,dy)||1;
      const lift=Math.min(len*.28,90);
      const sign=(li%2===0)?1:-1;
      const cx=mx-(dy/len)*lift*sign;
      const cy=my+(dx/len)*lift*.3;

      const el=gArc.append('path')
        .attr('class','arc')
        .attr('d',`M${pa[0]} ${pa[1]} Q${cx} ${cy} ${pb[0]} ${pb[1]}`)
        .attr('stroke',def.color)
        .attr('stroke-width',Math.max(1.2,(str/100)*4))
        .attr('opacity',.6)
        .attr('data-from',from).attr('data-to',to)
        .attr('data-layer',layer).attr('data-str',str);

      arcData.push({el:el.node(),from,to,str,layer});
      count++;
    });
  });

  document.getElementById('stat-arcs').textContent = count;
  document.getElementById('sb-arc-count').textContent = count;
  applyFilters();
}

//  NODES
function drawNodes(){
  gNode.selectAll('*').remove();
  NODES.forEach(node=>{
    if(!activeSpheres.has(node.sphere)) return;
    const pos=proj([node.lon,node.lat]);
    if(!pos) return;
    const color=SPHERES[node.sphere].color;
    const g=gNode.append('g').attr('class','node')
      .attr('transform',`translate(${pos[0]},${pos[1]})`)
      .attr('data-id',node.id);

    g.append('circle').attr('class','nd-halo').attr('r',15).attr('fill',color).attr('fill-opacity',.06);
    g.append('circle').attr('class','nd-ring').attr('r',8.5)
      .attr('fill','none').attr('stroke',color).attr('stroke-width',1).attr('stroke-opacity',.45);
    g.append('circle').attr('class','nd-core').attr('r',5).attr('fill',color).attr('fill-opacity',.9);
    g.append('text').attr('class','nd-label').attr('y',12).text(node.label);

    g.on('click',e=>{e.stopPropagation();selectNode(node);})
     .on('mouseenter',e=>showTip(e,node))
     .on('mouseleave',hideTip);
  });
}

//  FILTER / SELECT
function applyFilters(){
  arcData.forEach(arc=>{
    const sphereOk = activeSpheres.has(nodeMap[arc.from]?.sphere) && activeSpheres.has(nodeMap[arc.to]?.sphere);
    const layerOk  = activeLayers.has(arc.layer);
    const selOk    = !selectedId || arc.from===selectedId || arc.to===selectedId;
    const vis      = sphereOk && layerOk && selOk;
    d3.select(arc.el)
      .attr('opacity', vis ? (selectedId?.9:.62) : .04)
      .classed('sel', vis && !!selectedId);
  });
  gNode.selectAll('.node').each(function(){
    const id=d3.select(this).attr('data-id');
    const sphereOk = activeSpheres.has(nodeMap[id]?.sphere);
    if(!sphereOk){d3.select(this).attr('opacity',0);return;}
    if(!selectedId){d3.select(this).attr('opacity',1);return;}
    const conn=getConnected(selectedId);
    d3.select(this).attr('opacity',(id===selectedId||conn.has(id))?1:.15);
  });
  gLand.selectAll('.cpath').each(function(){
    const sk=d3.select(this).attr('data-sphere');
    if(!sk) return;
    const on = activeSpheres.has(sk);
    d3.select(this).attr('fill-opacity', on?0.18:0.04).attr('stroke-opacity', on?0.25:0.06);
  });
}

function getConnected(id){
  const s=new Set();
  Object.values(CONNECTIONS).flat().forEach(([a,b])=>{if(a===id)s.add(b);if(b===id)s.add(a);});
  return s;
}

function selectNode(node){
  selectedId = (selectedId===node.id)?null:node.id;
  applyFilters();
  updateInfoPanel(selectedId?node:null);
  document.getElementById('sb-sel').textContent = selectedId ? node.label : 'none';
  if(selectedId && window.innerWidth<=768){
    openSheet(true);
    switchTab('info');
  }
}

function deselect(){
  if(!selectedId) return;
  selectedId=null; applyFilters(); updateInfoPanel(null);
  document.getElementById('sb-sel').textContent='none';
}

//  INFO PANEL
function updateInfoPanel(node){
  const infoEl=document.getElementById('info');
  if(!node){infoEl.classList.remove('open');return;}

  document.getElementById('inf-name').textContent=node.label;
  const sp=SPHERES[node.sphere];
  document.getElementById('inf-dot').style.background=sp.color;
  document.getElementById('inf-sphere').textContent=sp.label;
  document.getElementById('inf-sphere').style.color=sp.color;
  document.getElementById('inf-desc').textContent=node.desc;

  const cont=document.getElementById('info-conns');
  cont.innerHTML='';
  let total=0;

  Object.keys(LAYERS).forEach(lk=>{
    if(!activeLayers.has(lk)) return;
    const def=LAYERS[lk];
    const rows=(CONNECTIONS[lk]||[]).filter(([a,b])=>a===node.id||b===node.id)
      .map(([a,b,str])=>({other:nodeMap[a===node.id?b:a],str}))
      .filter(r=>r.other && activeSpheres.has(r.other.sphere))
      .sort((a,b)=>b.str-a.str);
    if(!rows.length) return;
    total+=rows.length;

    const hdr=document.createElement('div');
    hdr.className='conn-grp-hdr';
    hdr.style.color=def.color;
    hdr.textContent=def.icon + ' ' + def.label + ' (' + rows.length + ')';
    cont.appendChild(hdr);

    rows.forEach(r=>{
      const row=document.createElement('div');
      row.className='conn-row';
      row.innerHTML=
        '<div class="conn-pip" style="background:'+def.color+'"></div>'+
        '<div class="conn-name">'+r.other.label+'</div>'+
        '<div class="conn-bar-bg"><div class="conn-bar-fg" style="width:'+r.str+'%;background:'+def.color+'"></div></div>'+
        '<div class="conn-pct">'+r.str+'%</div>';
      cont.appendChild(row);
    });
  });

  if(!total){
    cont.innerHTML='<div class="no-conn">No active connections match current filters.</div>';
  }

  if(window.innerWidth>768) infoEl.classList.add('open');
  updateMobileInfo(node);
}

//  TOOLTIP
const tip=document.getElementById('tip');
function showTip(e,node){
  const sp=SPHERES[node.sphere];
  tip.innerHTML='<strong style="color:'+sp.color+'">'+node.label+'</strong><br><span style="font-size:.52rem;color:var(--muted)">'+sp.label+'</span>';
  tip.classList.add('show');
  moveTip(e);
}
function hideTip(){tip.classList.remove('show');}
svg.on('mousemove',moveTip);
function moveTip(e){
  if(!tip.classList.contains('show')) return;
  tip.style.left=(e.clientX+14)+'px';
  tip.style.top=(e.clientY-8)+'px';
}

//  SIDEBAR
function buildSidebar(){
  const sg=document.getElementById('sph-leg');
  Object.entries(SPHERES).forEach(([k,s])=>{
    const d=document.createElement('div');
    d.className='sph-chip on';
    d.dataset.key=k;
    d.innerHTML='<div class="sph-dot" style="background:'+s.color+'"></div><span class="sph-lbl">'+s.label+'</span>';
    d.addEventListener('click',()=>{
      const on=activeSpheres.has(k);
      if(on) activeSpheres.delete(k); else activeSpheres.add(k);
      d.classList.toggle('on',!on===false);
      d.classList.toggle('off',on);
      d.classList.toggle('on',!on);
      drawNodes(); drawArcs();
      if(selectedId){
        const node=nodeMap[selectedId];
        if(!node||!activeSpheres.has(node.sphere)) deselect();
        else updateInfoPanel(node);
      }
    });
    sg.appendChild(d);
  });

  // Layers
  const ll=document.getElementById('lyr-list');
  Object.entries(LAYERS).forEach(([k,layer])=>{
    const row=document.createElement('div');
    row.className='lyr-row';
    const tog=document.createElement('div');
    tog.className='tog on';
    tog.style.setProperty('--tc',layer.color);
    const lbl=document.createElement('span');
    lbl.className='lyr-name'; lbl.textContent=layer.label;
    const icon=document.createElement('i');
    icon.className='lyr-icon'; icon.textContent=layer.icon;
    const cnt=document.createElement('span');
    cnt.className='lyr-count'; cnt.textContent=(CONNECTIONS[k]||[]).length;
    row.append(tog,icon,lbl,cnt);
    row.addEventListener('click',()=>{
      const on=activeLayers.has(k);
      if(on) activeLayers.delete(k); else activeLayers.add(k);
      tog.classList.toggle('on',!on);
      drawArcs();
      if(selectedId) updateInfoPanel(nodeMap[selectedId]);
    });
    ll.appendChild(row);
  });
}

//  MOBILE SHEET
let sheetOpen=false;
let sheetTab='filters';

function buildMobileSheet(){
  document.getElementById('sheet-handle').addEventListener('click',()=>openSheet(!sheetOpen));
  document.querySelectorAll('.sh-tab').forEach(t=>{
    t.addEventListener('click',()=>switchTab(t.dataset.tab));
  });
  renderSheetFilters();
}

function openSheet(open){
  sheetOpen=open;
  const sheet=document.getElementById('sheet');
  if(open){
    sheet.style.height='58vh';
    document.getElementById('sheet-tabs').style.display='flex';
    document.getElementById('sheet-body').style.display='block';
  } else {
    sheet.style.height='64px';
    document.getElementById('sheet-tabs').style.display='none';
    document.getElementById('sheet-body').style.display='none';
  }
}

function switchTab(tab){
  sheetTab=tab;
  document.querySelectorAll('.sh-tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===tab));
  const body=document.getElementById('sheet-body');
  if(tab==='filters') renderSheetFilters();
  else renderSheetInfo();
}

function renderSheetFilters(){
  const body=document.getElementById('sheet-body');
  body.innerHTML='<div style="font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-bottom:.5rem;">Spheres</div>';
  const sg=document.createElement('div');
  sg.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:.8rem;';
  Object.entries(SPHERES).forEach(([k,s])=>{
    const d=document.createElement('div');
    d.style.cssText='display:flex;align-items:center;gap:.35rem;padding:5px 7px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:.6rem;color:var(--text);transition:opacity .2s;opacity:'+(activeSpheres.has(k)?1:.25)+';';
    d.innerHTML='<div style="width:7px;height:7px;border-radius:50%;background:'+s.color+';flex-shrink:0"></div>'+s.label;
    d.addEventListener('click',()=>{
      const on=activeSpheres.has(k);
      if(on) activeSpheres.delete(k); else activeSpheres.add(k);
      d.style.opacity=on?'.25':'1';
      drawNodes(); drawArcs();
    });
    sg.appendChild(d);
  });
  body.appendChild(sg);

  const lh=document.createElement('div');
  lh.style.cssText='font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;margin-bottom:.5rem;';
  lh.textContent='Layers';
  body.appendChild(lh);

  Object.entries(LAYERS).forEach(([k,layer])=>{
    const row=document.createElement('div');
    row.style.cssText='display:flex;align-items:center;gap:.5rem;padding:5px 0;cursor:pointer;';
    const tog=document.createElement('div');
    const isOn=activeLayers.has(k);
    tog.style.cssText='width:28px;height:15px;border-radius:8px;background:'+(isOn?layer.color:'var(--muted)')+';position:relative;flex-shrink:0;transition:background .2s;';
    tog.innerHTML='<div style="position:absolute;top:2px;left:'+(isOn?'15':'2')+'px;width:11px;height:11px;border-radius:50%;background:#fff;transition:left .2s;"></div>';
    const lbl=document.createElement('span');
    lbl.style.cssText='font-size:.65rem;color:var(--text);flex:1;';
    lbl.textContent=layer.icon + ' ' + layer.label;
    const cnt=document.createElement('span');
    cnt.style.cssText='font-size:.52rem;color:var(--muted);';
    cnt.textContent=(CONNECTIONS[k]||[]).length;
    row.append(tog,lbl,cnt);
    row.addEventListener('click',()=>{
      const on=activeLayers.has(k);
      if(on) activeLayers.delete(k); else activeLayers.add(k);
      tog.style.background=on?'var(--muted)':layer.color;
      tog.firstChild.style.left=on?'2px':'15px';
      drawArcs();
      if(selectedId) updateInfoPanel(nodeMap[selectedId]);
    });
    body.appendChild(row);
  });
}

  const body=document.getElementById('sheet-body');
  if(!selectedId){
    body.innerHTML='<div style="font-size:.62rem;color:var(--muted);text-align:center;padding:1rem 0;">Select a country node on the map.</div>';
    return;
  }
  const node=nodeMap[selectedId];
  const sp=SPHERES[node.sphere];

    '<div style="display:flex;align-items:center;gap:5px;font-size:.52rem;margin-top:.15rem;">'+
      '<div style="width:6px;height:6px;border-radius:50%;background:'+sp.color+'"></div>'+
      '<span style="color:'+sp.color+'">'+sp.label+'</span>'+
    '</div>'+
    '<div style="font-size:.58rem;color:var(--text);line-height:1.6;margin-top:.4rem;opacity:.8;">'+node.desc+'</div>';
  body.appendChild(hdr);

  Object.keys(LAYERS).forEach(lk=>{
    if(!activeLayers.has(lk)) return;
    const def=LAYERS[lk];
    const rows=(CONNECTIONS[lk]||[]).filter(([a,b])=>a===node.id||b===node.id)
      .map(([a,b,str])=>({other:nodeMap[a===node.id?b:a],str}))
      .filter(r=>r.other && activeSpheres.has(r.other.sphere))
      .sort((a,b)=>b.str-a.str);
    if(!rows.length) return;

    const gh=document.createElement('div');
    gh.style.cssText='font-size:.5rem;color:'+def.color+';text-transform:uppercase;letter-spacing:.1em;padding:.4rem 0 .2rem;';
    gh.textContent=def.icon + ' ' + def.label + ' (' + rows.length + ')';
    body.appendChild(gh);

    rows.forEach(r=>{
      const rr=document.createElement('div');
      rr.style.cssText='display:flex;align-items:center;gap:6px;padding:2px 0;font-size:.58rem;';
      rr.innerHTML='<div style="width:5px;height:5px;border-radius:50%;background:'+def.color+';flex-shrink:0"></div>'+
        '<span style="flex:1;color:var(--white)">'+r.other.label+'</span>'+
        '<div style="width:42px;height:3px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+r.str+'%;background:'+def.color+'"></div></div>'+
        '<span style="font-size:.5rem;color:var(--muted);min-width:22px;text-align:right">'+r.str+'%</span>';
      body.appendChild(rr);
    });
  });
}

function updateMobileInfo(node){
  if(sheetTab==='info') renderSheetInfo();
}

document.getElementById('info-close').addEventListener('click',deselect);

init();
