<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Connections</title>
<meta name="theme-color" content="#05080F">
<meta name="description" content="Interactive world map visualization exploring global and civilizational connections">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WorldMap">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="hdr">
  <div style="display:flex;align-items:baseline;gap:.8rem;min-width:0;">
    <h1>Global Connections</h1>
    <span class="hdr-tag">Civilisational Alignments</span>
  </div>
  <div class="hdr-meta">
    <div style="display:flex;align-items:center;gap:.4rem;"><div class="dot"></div><span id="stat-arcs">--</span> links</div>
    <div class="hdr-stat"><span id="stat-nodes">--</span> nodes</div>
  </div>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sb-scroll">

      <div class="sb-sec">
        <div class="sb-ttl">Spheres</div>
        <div class="sph-grid" id="sph-leg"></div>
      </div>

      <div class="sb-sec">
        <div class="sb-ttl">Layers</div>
        <div id="lyr-list"></div>
      </div>

    </div>
    <div class="sb-stats">
      <div>Links: <span id="sb-arc-count">--</span></div>
      <div>Selected: <span id="sb-sel">none</span></div>
    </div>
  </div>

  <div id="map"><canvas id="map-canvas"></canvas><svg id="map-svg"></svg></div>
</div>

<!-- Right panel -->
<div id="info">
  <div id="info-hdr">
    <div>
      <div class="info-name" id="inf-name"></div>
      <div class="info-badge"><div class="info-badge-dot" id="inf-dot"></div><span id="inf-sphere"></span></div>
    </div>
    <button id="info-close" title="Close">x</button>
  </div>
  <div class="info-desc" id="inf-desc"></div>
  <div id="info-conns"></div>
</div>

<!-- Mobile bottom sheet -->
<div id="sheet">
  <div id="sheet-handle"><div class="handle-bar"></div></div>
  <div id="sheet-tabs" style="display:none;">
    <div class="sh-tab on" data-tab="filters">Layers & Spheres</div>
    <div class="sh-tab" data-tab="info">Country Info</div>
  </div>
  <div id="sheet-body" style="display:none;"></div>
</div>

<div id="tip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script type="module" src="js/main.js"></script>
<script src="install-prompt.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('/service-worker.js', { scope: '/' });
  });
}
</script>
</body>
</html>
